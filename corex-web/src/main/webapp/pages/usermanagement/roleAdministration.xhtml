<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/template.xhtml">


    <ui:define name="content">
        <f:event listener="#{roleAdministrationBean.initializePageAttributes}" type="preRenderComponent"/>
        <h:form id="form">
            <div class="col-12">
                <p:breadCrumb>
                    <p:menuitem url="#" icon="pi pi-home"/>
                    <p:menuitem value="#{msg['userManagementLabel']}" url="#"/>
                    <p:menuitem value="#{msg['manageRoleLabel']}" url="#"/>
                </p:breadCrumb>
            </div>
            <div class="grid crud-demo">
                <div class="col-12">
                    <p:outputPanel class="card" id="orgMainPanelId">
                        <p:growl id="messages" showDetail="true"/>

                        <p:toolbar styleClass="mb-4">
                            <p:toolbarGroup>
                                <p:commandButton value="#{msg['newLabel']}" icon="pi pi-plus"
                                                 actionListener="#{roleAdministrationBean.addButtonAction}"
                                                 update=":form:addEditOrgPanelId" process="@this"
                                                 oncomplete="PF('manageRoleDialog').show()"
                                                 styleClass="ui-button-success" style="margin-right: .5rem"/>
                                <p:commandButton value="#{msg['fetchRolesLabel']}" icon="pi pi-search"
                                                 action="#{roleAdministrationBean.searchButtonAction}"
                                                 update=":form:orgMainPanelId" process="@this"
                                                 styleClass="ui-button-success" style="margin-right: .5rem"/>

                                <h:outputLabel value="#{msg['noOfRecordsLabel']}: " rendered="#{roleAdministrationBean.datatableRendered}"/>
                                <h:outputText value="#{roleAdministrationBean.recordsCount}" rendered="#{roleAdministrationBean.datatableRendered}"/>
                            </p:toolbarGroup>
                            <p:toolbarGroup align="right">
                                <p:commandButton value="#{msg['exportLabel']}" icon="pi pi-upload" styleClass="ui-button-help"
                                                 rendered="#{roleAdministrationBean.datatableRendered}">
                                    <p:dataExporter type="pdf" target="orgDataTableId" fileName="#{msg['manageRoleLabel']}"/>
                                </p:commandButton>
                            </p:toolbarGroup>
                        </p:toolbar>

                        <p:outputPanel id="datatablePanelId" rendered="#{roleAdministrationBean.datatableRendered}">
                            <p:dataTable id="orgDataTableId" widgetVar="roleDataTable" var="role" value="#{roleAdministrationBean.rolesList}"
                                         reflow="true" styleClass="commoncrud-table"
                                         rowKey="#{role.id}" paginator="true" rows="10" paginatorPosition="bottom">
                                <f:facet name="header">
                                    <div class="products-table-header">
                                        <span style="font-weight: bold">#{msg['searchRoleLabel']}</span>
                                        <span class="filter-container ui-input-icon-left">
                                            <i class="pi pi-search"></i>
                                            <p:inputText id="globalFilter" onkeyup="PF('roleDataTable').filter()" placeholder="#{msg['searchLabel']}"/>
                                        </span>
                                    </div>
                                </f:facet>

                                <p:column headerText="#{msg['roleIdLabel']}" sortBy="#{role.id}" filterBy="#{role.id}">
                                    <h:outputText value="#{role.id}"/>
                                </p:column>
                                <p:column headerText="#{msg['roleLabel']}" sortBy="#{role.roleName}" filterBy="#{role.roleName}">
                                    <h:outputText value="#{role.roleName}"/>
                                </p:column>

                                <p:column exportable="false">
                                    <p:commandButton icon="pi pi-pencil" oncomplete="PF('manageRoleDialog').show()"
                                                     action="#{roleAdministrationBean.confirmEditButtonAction}"
                                                     styleClass="edit-button rounded-button ui-button-success"
                                                     update=":form:addEditOrgPanelId" process="@this">
                                        <f:setPropertyActionListener value="#{role}" target="#{roleAdministrationBean.selectedRole}"/>
                                    </p:commandButton>
                                    <p:commandButton class="ui-button-warning rounded-button" icon="pi pi-trash"
                                                     process="@this" oncomplete="PF('deleteRoleDialog').show()">
                                        <f:setPropertyActionListener value="#{role}" target="#{roleAdministrationBean.selectedRole}"/>
                                    </p:commandButton>
                                </p:column>
                            </p:dataTable>
                        </p:outputPanel>

                        <p:dialog header="#{msg['roleDetailsLabel']}" showEffect="fade" modal="true" widgetVar="manageRoleDialog"
                                  responsive="true" width="75%">
                            <p:outputPanel id="addEditOrgPanelId" class="ui-fluid" style="height: 600px; overflow-y: auto;">
                                <p:panelGrid columns="2" layout="flex"
                                             columnClasses="col-12 md:col-3 xl:col-2, col-12 md:col-9 xl:col-4"
                                             contentStyleClass="align-items-baseline ui-fluid">
                                    <p:outputLabel for="roleName" value="#{msg['roleNameLabel']}"/>
                                    <p:inputText id="roleName" value="#{roleAdministrationBean.roleName}"/>
                                </p:panelGrid>
                                <p:spacer height="4"/>

                                <ui:repeat var="module" value="#{roleAdministrationBean.roleModuleList}">
                                    <p:fieldset legend="#{module.module}">
                                        <p:dataTable var="submodule" value="#{module.roleSubModuleBeanList}">
                                            <p:column headerText="#{msg['submoduleLabel']}" style="width: 20%;">
                                                <h:outputText value="#{submodule.subModule}"/>
                                            </p:column>
                                            <p:column headerText="#{msg['privilegesLabel']}" style="width: 80%;">
                                                <p:selectManyCheckbox value="#{submodule.selectedPrivilegeList}" layout="lineDirection">
                                                    <f:selectItems value="#{submodule.rolePrivilegeBeanList}" var="privilege"
                                                                   itemLabel="#{privilege}" itemValue="#{privilege}"/>
                                                </p:selectManyCheckbox>
                                            </p:column>
                                        </p:dataTable>
                                    </p:fieldset>
                                    <p:spacer height="5"/>
                                </ui:repeat>
                            </p:outputPanel>

                            <f:facet name="footer">
                                <p:commandButton value="#{msg['saveLabel']}" icon="pi pi-check"
                                                 actionListener="#{roleAdministrationBean.saveRole}"
                                                 update=":form:addEditOrgPanelId :form:messages :form:datatablePanelId :form:roleUpdateConfirmPanelId"
                                                 process=":form:addEditOrgPanelId @this"/>
                                <p:commandButton value="#{msg['cancelLabel']}" icon="pi pi-times"
                                                 onclick="PF('manageRoleDialog').hide()" class="ui-button-secondary"/>
                            </f:facet>
                        </p:dialog>

                        <p:confirmDialog widgetVar="roleUpdateConfirmDialog" showEffect="fade" width="450"
                                         header="#{msg['confirmLabel']}" severity="warn">
                            <p:outputPanel id="roleUpdateConfirmPanelId">
                                <h:outputText value="The following active users will be forced logged out if you update this role:" />
                                <ul style="margin-top: 1rem; margin-bottom: 1rem;">
                                    <ui:repeat var="activeUser" value="#{roleAdministrationBean.impactedActiveRoleUsers}">
                                        <li>
                                            <h:outputText value="#{activeUser}" />
                                        </li>
                                    </ui:repeat>
                                </ul>
                                <h:outputText value="Do you want to continue?" />
                            </p:outputPanel>
                            <p:commandButton value="#{msg['yesLabel']}" icon="pi pi-check"
                                             actionListener="#{roleAdministrationBean.confirmRoleUpdateAndLogout}"
                                             process="@this"
                                             update=":form:messages :form:orgMainPanelId :form:roleUpdateConfirmPanelId"/>
                            <p:commandButton value="#{msg['noLabel']}" type="button" styleClass="ui-button-secondary"
                                             icon="pi pi-times" onclick="PF('roleUpdateConfirmDialog').hide()"/>
                        </p:confirmDialog>

                        <p:confirmDialog widgetVar="deleteRoleDialog" showEffect="fade" width="300"
                                         message="#{msg['deleteTheRoleLabel']}?" header="#{msg['confirmLabel']}" severity="warn">
                            <p:commandButton value="#{msg['yesLabel']}" icon="pi pi-check"
                                             actionListener="#{roleAdministrationBean.confirmDeleteRole}" process="@this"
                                             oncomplete="PF('deleteRoleDialog').hide()"/>
                            <p:commandButton value="#{msg['noLabel']}" type="button" styleClass="ui-button-secondary"
                                             icon="pi pi-times" onclick="PF('deleteRoleDialog').hide()"/>
                        </p:confirmDialog>
                    </p:outputPanel>
                </div>
            </div>
        </h:form>
    </ui:define>

</ui:composition>

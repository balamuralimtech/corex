<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <f:facet name="first">
        <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
    </f:facet>
    <link rel="icon" href="#{resource[appInfo.brandIconResource]}" type="image/svg+xml"/>
    <link rel="shortcut icon" href="#{resource[appInfo.brandIconResource]}" type="image/svg+xml"/>
    <title>#{appInfo.appName}</title>
    <h:outputStylesheet name="css/primeflex.min.css" library="avalon-layout"/>
    <h:outputStylesheet name="css/primeicons.css" library="avalon-layout"/>
    <style>
        body{margin:0;font-family:"Segoe UI","Helvetica Neue",Arial,sans-serif;background:linear-gradient(135deg,#e2e8f0,#f8fafc);color:#0f172a}
        .setup-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
        .setup-card{width:min(560px,100%);background:#fff;border:1px solid #dbe6f3;border-radius:24px;box-shadow:0 24px 70px rgba(15,23,42,.12);padding:2rem}
        .setup-title{margin:0;font-size:2rem;font-weight:700;letter-spacing:-.03em}
        .setup-copy{margin:.75rem 0 0;color:#64748b;line-height:1.7}
        .setup-note{margin:1rem 0 0;padding:1rem 1.1rem;border-radius:16px;background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;line-height:1.6}
        .setup-field{margin-top:1rem}
        .setup-label{display:block;margin-bottom:.45rem;font-size:.92rem;font-weight:600;color:#334155}
        .setup-field .ui-inputfield{width:100%;height:3rem;border-radius:12px!important;border:1px solid #cbd5e1!important;box-shadow:none!important;padding:0 .95rem!important;background:#fff!important}
        .setup-actions{margin-top:1.4rem}
        .setup-submit.ui-button{width:100%;border:none!important;border-radius:12px!important;background:#1d4ed8!important}
        .setup-submit.ui-button .ui-button-text{padding:.95rem 1rem!important;font-weight:700}
    </style>
</h:head>
<h:body>
    <f:event listener="#{setupBean.initializePageAttributes}" type="preRenderComponent"/>
    <div class="setup-page">
        <div class="setup-card">
            <h1 class="setup-title">Create Initial Application Admin</h1>
            <p class="setup-copy">No users were found in the database. Create the first system-level application administrator to finish bootstrapping the platform.</p>
            <div class="setup-note">
                This account does not belong to any organization. It has unrestricted access across the full application.
            </div>

            <h:form id="setupForm">
                <p:growl id="messages" showDetail="true"/>

                <div class="setup-field">
                    <label class="setup-label" for="setupForm:username">Username</label>
                    <p:inputText id="username" value="#{setupBean.username}"/>
                </div>

                <div class="setup-field">
                    <label class="setup-label" for="setupForm:email">Email</label>
                    <p:inputText id="email" value="#{setupBean.emailId}"/>
                </div>

                <div class="setup-field">
                    <label class="setup-label" for="setupForm:contact">Contact</label>
                    <p:inputText id="contact" value="#{setupBean.contact}"/>
                </div>

                <div class="setup-field">
                    <label class="setup-label" for="setupForm:password">Password</label>
                    <p:password id="password" value="#{setupBean.password}" feedback="false" toggleMask="true"/>
                </div>

                <div class="setup-field">
                    <label class="setup-label" for="setupForm:confirmPassword">Confirm Password</label>
                    <p:password id="confirmPassword" value="#{setupBean.confirmPassword}" feedback="false" toggleMask="true"/>
                </div>

                <div class="setup-actions">
                    <p:commandButton value="Create Application Admin"
                                     actionListener="#{setupBean.createInitialApplicationAdmin}"
                                     update="messages"
                                     process="@form"
                                     styleClass="setup-submit"/>
                </div>
            </h:form>
        </div>
    </div>
</h:body>
</html>

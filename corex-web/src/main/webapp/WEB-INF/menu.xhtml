<ui:composition
        xmlns="http://www.w3.org/1999/xhtml"
        xmlns:f="http://java.sun.com/jsf/core"
        xmlns:h="http://java.sun.com/jsf/html"
        xmlns:ui="http://java.sun.com/jsf/facelets"
        xmlns:p="http://primefaces.org/ui"
        xmlns:pu="http://primefaces.org/avalon">
    <h:form id="menuform">
        <div class="layout-menu-container #{guestPreferences.menuClass}">
            <div class="menu-scroll-content">
                <ui:fragment
                        rendered="#{guestPreferences.profileMode == 'inline' and not guestPreferences.horizontalMenuLayout}">
                    <div class="profile">
                        <a id="profile-options" href="#">
                            <p:graphicImage name="images/superuser.png" library="avalon-layout"
                                            styleClass="profile-image"
                                            style="border: 0 none"/>
                            <span class="profile-name">#{guestPreferences.userName}</span>
                            <i class="pi pi-fw pi-chevron-down"/>
                            <span class="profile-role">#{guestPreferences.role}</span>
                        </a>
                    </div>
                    <ul id="profile-menu" class="layout-menu">
                        <li role="menuitem">
                            <a href="#">
                                <i class="pi pi-fw pi-user"/>
                                <span>Profile</span>
                            </a>
                            <div class="layout-menu-tooltip">
                                <div class="layout-menu-tooltip-arrow"></div>
                                <div class="layout-menu-tooltip-text">Profile</div>
                            </div>
                        </li>
                        <li role="menuitem">
                            <a href="#">
                                <i class="pi pi-fw pi-lock"/>
                                <span>Privacy</span>
                            </a>
                            <div class="layout-menu-tooltip">
                                <div class="layout-menu-tooltip-arrow"></div>
                                <div class="layout-menu-tooltip-text">Privacy</div>
                            </div>
                        </li>
                        <li role="menuitem">
                            <a href="#">
                                <i class="pi pi-fw pi-cog"/>
                                <span>Settings</span>
                            </a>
                            <div class="layout-menu-tooltip">
                                <div class="layout-menu-tooltip-arrow"></div>
                                <div class="layout-menu-tooltip-text">Settings</div>
                            </div>
                        </li>
                        <li role="menuitem">
                            <h:commandLink action="#{guestPreferences.logoutAction}"
                                           title="Logout">
                                <i class="pi pi-fw pi-sign-out"/>
                            </h:commandLink>
                            <div class="layout-menu-tooltip">
                                <div class="layout-menu-tooltip-arrow"></div>
                                <div class="layout-menu-tooltip-text">Logout</div>
                            </div>
                        </li>
                    </ul>
                </ui:fragment>

                <pu:menu widgetVar="avalonMenuWidget" styleClass="layout-main-menu" model="#{dynamicMenu.model}"/>
            </div>
        </div>
    </h:form>
</ui:composition>

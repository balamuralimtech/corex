<ui:composition 
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:ui="http://java.sun.com/jsf/facelets"
    xmlns:p="http://primefaces.org/ui">
    
    <div class="layout-footer">
        <span class="footer-text-left">
            <span class="app-brand app-brand-footer">
                <h:graphicImage value="#{resource[appInfo.brandIconResource]}" alt="#{appInfo.appName}" styleClass="app-brand-icon" />
                <span class="app-brand-label app-brand-cxa-word" aria-label="#{appInfo.appName}">
                    <span class="app-brand-letter app-brand-letter-c">C</span>
                    <span class="app-brand-letter app-brand-letter-x">X</span>
                    <span class="app-brand-letter app-brand-letter-a">A</span>
                    <span class="app-brand-expand app-brand-expand-c">Care</span>
                    <span class="app-brand-expand app-brand-expand-rest">XApp</span>
                </span>
            </span>
        </span>
        <span class="footer-text-right">
            <a href="#"><i class="pi pi-facebook" /></a>
            <a href="#"><i class="pi pi-twitter" /></a>
            <a href="#"><i class="pi pi-github" /></a>
        </span>
    </div>
</ui:composition>

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">
<f:view contentType="text/html" locale="#{guestPreferences.locale}">
    <f:event listener="#{guestPreferences.initializePageAttributes}" type="preRenderView"/>
    <h:head>
        <meta charset="UTF-8"/>
        <f:facet name="first">
            <meta http-equiv="X-UA-Compatible" content="IE=edge" />
            <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
            <meta name="apple-mobile-web-app-capable" content="yes" />
            <meta name="mobile-web-app-capable" content="yes" />
            <meta name="theme-color" content="#{guestPreferences.themeColors[guestPreferences.theme]}" />
            <link rel="shortcut icon" href="#{request.contextPath}/resources/demo/images/coretix/coretixfavicon.png" type="image/x-icon" />
        </f:facet>
        <title>#{appInfo.appName}</title>
        <h:outputScript name="js/prism.js" library="avalon-layout"/>
        <h:outputScript name="js/layout.js" library="avalon-layout" />
        <h:outputScript name="highcharts/highcharts.js" library="avalon-layout"/>
        <h:outputScript name="highcharts/highcharts-3d.js" library="avalon-layout"/>
        <h:outputScript name="highcharts/modules/exporting.js" library="avalon-layout"/>
        <h:outputScript name="highcharts/modules/export-data.js" library="avalon-layout"/>
        <h:outputScript name="highcharts/modules/accessibility.js" library="avalon-layout"/>

        <h:outputScript name="pdfGenerator/jspdf.umd.min.js" library="avalon-layout"/>
        <h:outputScript name="pdfGenerator/html2canvas.min.js" library="avalon-layout"/>
        <ui:insert name="head"/>
        <script type="text/javascript">
            //<![CDATA[
            function showProgressBar()
            {
                console.log('inside showProgressBar !');
                var x = document.getElementById("progressBarId");
                x.style.display = "block";
            }
            function hideProgressBar()
            {
                console.log('inside hideProgressBar !');
                var x = document.getElementById("progressBarId");
                x.style.display = "none";
            }

            let roleUpdateCountdownInterval = null;

            function showForcedRoleUpdateDialog(message, seconds)
            {
                var messageElement = document.getElementById('forced-role-update-message');
                var countdownElement = document.getElementById('forced-role-update-countdown');

                if (messageElement) {
                    messageElement.textContent = message;
                }

                if (roleUpdateCountdownInterval) {
                    clearInterval(roleUpdateCountdownInterval);
                }

                if (countdownElement) {
                    countdownElement.textContent = seconds;
                }

                PF('forcedRoleUpdateDialog').show();

                roleUpdateCountdownInterval = setInterval(function() {
                    seconds--;

                    if (countdownElement) {
                        countdownElement.textContent = seconds;
                    }

                    if (seconds <= 0) {
                        clearInterval(roleUpdateCountdownInterval);
                        roleUpdateCountdownInterval = null;
                        roleUpdateForceLogout();
                    }
                }, 1000);
            }

            window.corexSessionAudit = {
                url: '#{request.contextPath}/session-audit',
                heartbeatId: null,
                logoutRequested: false,
                navigationRequested: false
            };

            function markSessionLogoutIntent() {
                window.corexSessionAudit.logoutRequested = true;
            }

            function markSessionNavigationIntent() {
                window.corexSessionAudit.navigationRequested = true;
            }

            function postSessionAudit(action, useBeacon) {
                var url = window.corexSessionAudit.url + '?action=' + encodeURIComponent(action);
                if (useBeacon && navigator.sendBeacon) {
                    var data = new FormData();
                    data.append('action', action);
                    navigator.sendBeacon(url, data);
                    return;
                }

                fetch(url, {
                    method: 'POST',
                    credentials: 'same-origin',
                    keepalive: action === 'browser-close',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: 'action=' + encodeURIComponent(action)
                }).catch(function() {
                });
            }

            function startSessionHeartbeat() {
                if (window.corexSessionAudit.heartbeatId) {
                    clearInterval(window.corexSessionAudit.heartbeatId);
                }

                window.corexSessionAudit.heartbeatId = window.setInterval(function() {
                    postSessionAudit('heartbeat', false);
                }, 60000);
            }

            function applyStoredUiPreferences() {
                if (window.PrimeFaces && PrimeFaces.AvalonConfigurator) {
                    PrimeFaces.AvalonConfigurator.changeComponentsTheme('#{guestPreferences.theme}');
                    PrimeFaces.AvalonConfigurator.changeMenuLayout('#{guestPreferences.menuLayout}');
                    PrimeFaces.AvalonConfigurator.updateInputStyle('#{guestPreferences.inputStyle}');

                    if ('#{guestPreferences.menuClass}' === 'layout-menu-dark') {
                        PrimeFaces.AvalonConfigurator.changeMenuToDark();
                    } else {
                        PrimeFaces.AvalonConfigurator.changeMenuToLight();
                    }
                }
            }

            window.addEventListener('load', function() {
                applyStoredUiPreferences();
                startSessionHeartbeat();
                window.corexSessionAudit.navigationRequested = false;
            });

            window.addEventListener('pagehide', function() {
                if (!window.corexSessionAudit.logoutRequested && !window.corexSessionAudit.navigationRequested) {
                    postSessionAudit('browser-close', true);
                }
            });

            document.addEventListener('click', function(event) {
                var target = event.target;
                if (!target) {
                    return;
                }

                var interactiveTarget = target.closest('a, button, input[type="submit"], input[type="button"]');
                if (interactiveTarget) {
                    markSessionNavigationIntent();
                }
            }, true);

            document.addEventListener('submit', function() {
                markSessionNavigationIntent();
            }, true);

            //]]>
        </script>
        <style>
            /*******************
                Preloader
                ********************/
            .preloader {
                width: 100%;
                height: 100%;
                top: 0px;
                position: fixed;
                z-index: 99999;
                background: #fff;
            }
            .preloader .cssload-speeding-wheel {
                position: absolute;
                top: calc(50% - 3.5px);
                left: calc(50% - 3.5px);
            }

            .loader {
                position: absolute;
                top: 50%;
                left: 50%;
                -webkit-transform: translate(-50%, -50%);
                -moz-transform: translate(-50%, -50%);
                -ms-transform: translate(-50%, -50%);
                -o-transform: translate(-50%, -50%);
                transform: translate(-50%, -50%);
            }

            .loader {
                overflow: visible;
                padding-top: 2em;
                height: 0;
                width: 2em;
            }

            .loader__label {
                float: left;
                margin-left: 50%;
                -webkit-transform: translateX(-50%);
                -moz-transform: translateX(-50%);
                -ms-transform: translateX(-50%);
                -o-transform: translateX(-50%);
                transform: translateX(-50%);
                margin: 0.5em 0 0 50%;
                font-size: 0.875em;
                letter-spacing: 0.1em;
                line-height: 1.5em;
                white-space: nowrap;
                -webkit-animation: loader-label 1.15s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
                -moz-animation: loader-label 1.15s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
                animation: loader-label 1.15s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
            }

            @-webkit-keyframes loader-label {
                0% {
                    opacity: 0.25;
                }
                30% {
                    opacity: 1;
                }
                100% {
                    opacity: 0.25;
                }
            }

            @-moz-keyframes loader-label {
                0% {
                    opacity: 0.25;
                }
                30% {
                    opacity: 1;
                }
                100% {
                    opacity: 0.25;
                }
            }

            @keyframes loader-label {
                0% {
                    opacity: 0.25;
                }
                30% {
                    opacity: 1;
                }
                100% {
                    opacity: 0.25;
                }
            }
            body .ui-breadcrumb{
                background: none !important;
                padding: 0rem !important;
            }
            .app-brand {
                font-family: "Roboto", sans-serif;
                font-size: 30px;
                font-weight: 700;
                letter-spacing: 0.04em;
                line-height: 1;
                text-decoration: none;
                text-transform: none;
                display: inline-flex;
                align-items: center;
            }
            .app-brand-topbar {
                color: #ffffff;
                height: 30px;
                cursor: pointer;
            }
            .app-brand-footer {
                color: #2d3436;
            }
        </style>
    </h:head>

        <h:body styleClass="#{guestPreferences.inputStyleClass}">
        <h:form>
            <p:growl id="growl" widgetVar="growlWidget" life="10000" />
            <p:poll interval="5" listener="#{guestPreferences.checkForGrowlMessage}" update="growl :topbar-items-form" global="false"
                    oncomplete="PrimeFaces.AvalonConfigurator.refreshTopbarState();"/>
            <p:remoteCommand name="roleUpdateForceLogout"
                             actionListener="#{guestPreferences.handleForcedRoleUpdateLogout}"
                             oncomplete="window.location='#{request.contextPath}/landing';" />
        </h:form>

        <p:dialog header="Role Update Notification" widgetVar="forcedRoleUpdateDialog" modal="true"
                  closable="false" draggable="false" resizable="false" responsive="true" width="420">
            <div style="line-height: 1.7;">
                <div id="forced-role-update-message">Your role is getting updated.</div>
                <div style="margin-top: 1rem;">
                    Redirecting to login page in <span id="forced-role-update-countdown">10</span> seconds.
                </div>
            </div>
        </p:dialog>

        <!-- Preloader - style you can find in spinners.css -->
        <div class="preloader" id="progressBarId" style="display: none;background:none;">
            <div class="loader">
                <div class="loader__label" style="color: #{guestPreferences.activeLayoutColor} !important;">#{appInfo.appName} Loading...</div>

            </div>
        </div>
        <div class="layout-wrapper #{guestPreferences.getMenu()}">
            <p:growl id="mainMessagesGrowlId" showDetail="true"/>
            <ui:include src="./topbar.xhtml" />
            <ui:include src="./menu.xhtml" />

            <p:outputPanel id="contentPanelId" class="layout-main">
                <ui:insert name="content"/>
            </p:outputPanel>

            <p:outputPanel id="configPanelId">
            <ui:include src="./config.xhtml"/>
            </p:outputPanel>
            <ui:include src="./footer.xhtml" />

        </div>
        <p:ajaxStatus id="progressWaitStatus" 
                      onstart="showProgressBar();"
                      onsuccess="hideProgressBar();"/>

        <h:outputStylesheet name="css/font-awesome.css" library="avalon-layout" />
        <h:outputStylesheet name="css/primeflex.min.css" library="avalon-layout" />
        <h:outputStylesheet name="css/primeicons.css" library="avalon-layout" />
        <h:outputStylesheet name="css/layout-#{guestPreferences.layout}.css" library="avalon-layout" />
        <h:outputStylesheet name="css/demo.css" library="demo" />
    </h:body>
</f:view>
</html>

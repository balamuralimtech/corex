        <ui:insert name="head"/>
        <script type="text/javascript">
            //<![CDATA[
            function showProgressBar()
            {
                console.log('inside showProgressBar !');
                var x = document.getElementById("progressBarId");
                x.style.display = "block";
            }
            function hideProgressBar()
            {
                console.log('inside hideProgressBar !');
                var x = document.getElementById("progressBarId");
                x.style.display = "none";
            }

            let roleUpdateCountdownInterval = null;

            function showForcedRoleUpdateDialog(message, seconds)
            {
                var messageElement = document.getElementById('forced-role-update-message');
                var countdownElement = document.getElementById('forced-role-update-countdown');

                if (messageElement) {
                    messageElement.textContent = message;
                }

                if (roleUpdateCountdownInterval) {
                    clearInterval(roleUpdateCountdownInterval);
                }

                if (countdownElement) {
                    countdownElement.textContent = seconds;
                }

                PF('forcedRoleUpdateDialog').show();

                roleUpdateCountdownInterval = setInterval(function() {
                    seconds--;

                    if (countdownElement) {
                        countdownElement.textContent = seconds;
                    }

                    if (seconds <= 0) {
                        clearInterval(roleUpdateCountdownInterval);
                        roleUpdateCountdownInterval = null;
                        roleUpdateForceLogout();
                    }
                }, 1000);
            }

            window.corexSessionAudit = {
                url: '#{request.contextPath}/session-audit',
                heartbeatId: null,
                logoutRequested: false,
                navigationRequested: false
            };

            function markSessionLogoutIntent() {
                window.corexSessionAudit.logoutRequested = true;
            }

            function markSessionNavigationIntent() {
                window.corexSessionAudit.navigationRequested = true;
            }

            function postSessionAudit(action, useBeacon) {
                var url = window.corexSessionAudit.url + '?action=' + encodeURIComponent(action);
                if (useBeacon && navigator.sendBeacon) {
                    var data = new FormData();
                    data.append('action', action);
                    navigator.sendBeacon(url, data);
                    return;
                }

                fetch(url, {
                    method: 'POST',
                    credentials: 'same-origin',
                    keepalive: action === 'browser-close',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: 'action=' + encodeURIComponent(action)
                }).catch(function() {
                });
            }

            function startSessionHeartbeat() {
                if (window.corexSessionAudit.heartbeatId) {
                    clearInterval(window.corexSessionAudit.heartbeatId);
                }

                window.corexSessionAudit.heartbeatId = window.setInterval(function() {
                    postSessionAudit('heartbeat', false);
                }, 60000);
            }

            function applyStoredUiPreferences() {
                if (window.PrimeFaces && PrimeFaces.AvalonConfigurator) {
                    PrimeFaces.AvalonConfigurator.changeComponentsTheme('#{guestPreferences.theme}');
                    PrimeFaces.AvalonConfigurator.changeMenuLayout('#{guestPreferences.menuLayout}');
                    PrimeFaces.AvalonConfigurator.updateInputStyle('#{guestPreferences.inputStyle}');

                    if ('#{guestPreferences.menuClass}' === 'layout-menu-dark') {
                        PrimeFaces.AvalonConfigurator.changeMenuToDark();
                    } else {
                        PrimeFaces.AvalonConfigurator.changeMenuToLight();
                    }
                }
            }

            function handleGlobalPollError() {
                if (window.console && typeof window.console.warn === 'function') {
                    window.console.warn('CoreX topbar poll failed. Leaving the current page in place.');
                }
            }

            window.addEventListener('load', function() {
                applyStoredUiPreferences();
                startSessionHeartbeat();
                window.corexSessionAudit.navigationRequested = false;
            });

            window.addEventListener('pagehide', function() {
                if (!window.corexSessionAudit.logoutRequested && !window.corexSessionAudit.navigationRequested) {
                    postSessionAudit('browser-close', true);
                }
            });

            document.addEventListener('click', function(event) {
                var target = event.target;
                if (!target) {
                    return;
                }

                var interactiveTarget = target.closest('a, button, input[type="submit"], input[type="button"]');
                if (interactiveTarget) {
                    markSessionNavigationIntent();
                }
            }, true);

            document.addEventListener('submit', function() {
                markSessionNavigationIntent();
            }, true);

            //]]>
        </script>
        <style>
            .layout-wrapper .ui-breadcrumb {
                display:flex;
                align-items:center;
                flex-wrap:wrap;
                gap:.35rem;
                margin:0 0 1rem 0;

                box-shadow:0 10px 34px color-mix(in srgb, #{guestPreferences.activeLayoutColor} 10%, rgba(15,23,42,.06));
            }
            .layout-wrapper .ui-breadcrumb ul {
                display:flex;
                align-items:center;
                flex-wrap:wrap;
                gap:.35rem;
                width:100%;
                margin:0;
                padding:0;
            }
            .layout-wrapper .ui-breadcrumb ul li {
                display:inline-flex;
                align-items:center;
                float:none;
                margin:0;
            }
            .layout-wrapper .ui-breadcrumb ul li .ui-menuitem-link {

                gap:.45rem;
                min-height:2rem;
                padding:.45rem .8rem;

            }
            .layout-wrapper .ui-breadcrumb ul li .ui-menuitem-link .ui-menuitem-icon {
                color:#{guestPreferences.activeLayoutColor};
                font-size:.95rem;
            }
            .layout-wrapper .ui-breadcrumb ul li .ui-menuitem-link .ui-menuitem-text {

            }
            .layout-wrapper .ui-breadcrumb ul li .ui-menuitem-link:hover,

                background:color-mix(in srgb, #{guestPreferences.activeLayoutColor} 10%, white);
                color:color-mix(in srgb, #{guestPreferences.activeLayoutColor} 82%, #0f172a);

                color:color-mix(in srgb, #{guestPreferences.activeLayoutColor} 38%, #94a3b8);
                font-size:.8rem;

            }
            .layout-wrapper .ui-breadcrumb ul li:last-child .ui-menuitem-link {
                background:color-mix(in srgb, #{guestPreferences.activeLayoutColor} 12%, #f1f5f9);
                color:color-mix(in srgb, #{guestPreferences.activeLayoutColor} 78%, #0f172a);
            }

                    border-radius:16px;

                    padding:.42rem .68rem;
                    font-size:.88rem;
                }
            }
            /*******************
                Preloader
                ********************/
            .preloader {
                width: 100%;
                height: 100%;
                top: 0px;
                position: fixed;
                z-index: 99999;
                background: #fff;
            }
            .preloader .cssload-speeding-wheel {
                position: absolute;
                top: calc(50% - 3.5px);
                left: calc(50% - 3.5px);
            }

            .loader {
                position: absolute;
                top: 50%;
                left: 50%;
                -webkit-transform: translate(-50%, -50%);
                -moz-transform: translate(-50%, -50%);
                -ms-transform: translate(-50%, -50%);
                -o-transform: translate(-50%, -50%);
                transform: translate(-50%, -50%);
            }

            .loader {
                overflow: visible;
                padding-top: 2em;
                height: 0;
                width: 2em;
            }

            .loader__label {
                float: left;
                margin-left: 50%;
                -webkit-transform: translateX(-50%);
                -moz-transform: translateX(-50%);
                -ms-transform: translateX(-50%);
                -o-transform: translateX(-50%);
                transform: translateX(-50%);
                margin: 0.5em 0 0 50%;
                font-size: 0.875em;
                letter-spacing: 0.1em;
                line-height: 1.5em;
                white-space: nowrap;
                -webkit-animation: loader-label 1.15s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
                -moz-animation: loader-label 1.15s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
                animation: loader-label 1.15s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
            }

            @-webkit-keyframes loader-label {
                0% {
                    opacity: 0.25;
                }
                30% {
                    opacity: 1;
                }
                100% {
                    opacity: 0.25;
                }
            }

            @-moz-keyframes loader-label {
                0% {
                    opacity: 0.25;
                }
                30% {
                    opacity: 1;
                }
                100% {
                    opacity: 0.25;
                }
            }

            @keyframes loader-label {
                0% {
                    opacity: 0.25;
                }
                30% {
                    opacity: 1;
                }
                100% {
                    opacity: 0.25;
                }
            }
            body .ui-breadcrumb{
                background: none !important;
                padding: 0rem !important;
            }
            .app-brand {
                font-family: "Roboto", sans-serif;
                font-size: 30px;
                font-weight: 700;
                letter-spacing: 0.04em;
                line-height: 1;
                text-decoration: none;
                text-transform: none;
                display: inline-flex;
                align-items: center;
                gap: .6rem;
            }
            .app-brand-icon {
                width: 28px;
                height: 28px;
                flex: 0 0 auto;
                display: block;
            }
            .app-brand-label {
                display: inline-block;
                position: relative;
                white-space: nowrap;
            }
            .app-brand-topbar {
                color: #ffffff;
                height: 30px;
                cursor: pointer;
            }
            .app-brand-footer {
                color: #2d3436;
            }
            .app-brand-cxa-word {
                display: inline-flex;
                align-items: center;
                overflow: hidden;
                min-width: 0;
            }
            .app-brand-letter,
            .app-brand-expand {
                display: inline-block;
                font-weight: 800;
            }
            .app-brand-letter {
                transform-origin: 50% 60%;
                animation: appBrandLetterCycle 5.8s ease-in-out infinite;
            }
            .app-brand-letter-c {
                animation-delay: 0s;
            }
            .app-brand-letter-x {
                animation-delay: .16s;
            }
            .app-brand-letter-a {
                animation-delay: .32s;
            }
            .app-brand-expand {
                max-width: 0;
                opacity: 0;
                transform: translateX(-.22em);
                animation: appBrandExpandReveal 5.8s ease-in-out infinite;
            }
            .app-brand-expand-c {
                animation-delay: .08s;
            }
            .app-brand-expand-rest {
                animation-delay: .36s;
            }
            .app-brand-topbar .app-brand-letter,
            .app-brand-topbar .app-brand-expand {
                color: #ffffff;
                text-shadow: 0 1px 10px rgba(15,23,42,.12);
            }
            .app-brand-footer .app-brand-letter,
            .app-brand-footer .app-brand-expand {
                color: color-mix(in srgb, #{guestPreferences.activeLayoutColor} 72%, #0f172a);
            }
            @keyframes appBrandLetterCycle {
                0% {
                    transform: rotate(0deg) scale(1);
                    max-width: 1.2em;
                    opacity: 1;
                }
                16% {
                    transform: rotate(0deg) scale(1);
                    max-width: 1.2em;
                    opacity: 1;
                }
                26% {
                    transform: rotate(1turn) scale(1.08);
                    max-width: 1.2em;
                    opacity: 1;
                }
                36% {
                    transform: rotate(1turn) scale(1);
                    max-width: 0;
                    opacity: 0;
                }
                82% {
                    transform: rotate(1turn) scale(1);
                    max-width: 0;
                    opacity: 0;
                }
                100% {
                    transform: rotate(1turn) scale(1);
                    max-width: 1.2em;
                    opacity: 1;
                }
            }
            @keyframes appBrandExpandReveal {
                0% {
                    max-width: 0;
                    opacity: 0;
                    transform: translateX(-.22em);
                }
                18% {
                    max-width: 0;
                    opacity: 0;
                    transform: translateX(-.22em);
                }
                34% {
                    max-width: 5.4em;
                    opacity: 1;
                    transform: translateX(0);
                }
                68% {
                    max-width: 5.4em;
                    opacity: 1;
                    transform: translateX(0);
                }
                84% {
                    max-width: 0;
                    opacity: 0;
                    transform: translateX(-.22em);
                }
                100% {
                    max-width: 0;
                    opacity: 0;
                    transform: translateX(-.22em);
                }
            }
        </style>
    </h:head>

        <h:body styleClass="#{guestPreferences.inputStyleClass}">
        <h:form>
            <p:growl id="growl" widgetVar="growlWidget" life="10000" />
            <p:poll interval="1" listener="#{guestPreferences.checkForGrowlMessage}"
                    update="growl :topbar-items-form:messageUnreadCount :topbar-items-form:alertUnreadCount"
                    global="false"
                    onerror="handleGlobalPollError();"/>
            <p:remoteCommand name="roleUpdateForceLogout"
                             actionListener="#{guestPreferences.handleForcedRoleUpdateLogout}"
                             oncomplete="window.location='#{request.contextPath}/landing';" />
            <p:remoteCommand name="adminForceLogout"
                             actionListener="#{guestPreferences.handleAdminForceLogout}"
                             oncomplete="window.location='#{request.contextPath}/landing';" />
        </h:form>

        <p:dialog header="Role Update Notification" widgetVar="forcedRoleUpdateDialog" modal="true"
                  closable="false" draggable="false" resizable="false" responsive="true" width="420">
            <div style="line-height: 1.7;">
                <div id="forced-role-update-message">Your role is getting updated.</div>
                <div style="margin-top: 1rem;">
                    Redirecting to login page in <span id="forced-role-update-countdown">10</span> seconds.
                </div>
            </div>
        </p:dialog>

        <p:dialog header="Logout Notice" widgetVar="adminForceLogoutDialog" modal="true"
                  closable="false" draggable="false" resizable="false" responsive="true" width="420">
            <div style="line-height: 1.7;">
                <div id="admin-force-logout-message">Your session has been ended by an administrator.</div>
                <div style="margin-top: 1rem;">
                    Redirecting to login page in <span id="admin-force-logout-countdown">3</span> seconds.
                </div>
            </div>
        </p:dialog>

        <h:outputScript target="body">
            //<![CDATA[
            function showAdminForceLogoutDialog(message, seconds) {
                var messageElement = document.getElementById('admin-force-logout-message');
                var countdownElement = document.getElementById('admin-force-logout-countdown');
                var remaining = seconds || 3;

                if (messageElement) {
                    messageElement.textContent = message || 'Your session has been ended by an administrator.';
                }
                if (countdownElement) {
                    countdownElement.textContent = remaining;
                }

                PF('adminForceLogoutDialog').show();

                var intervalId = window.setInterval(function() {
                    remaining -= 1;
                    if (countdownElement) {
                        countdownElement.textContent = Math.max(remaining, 0);
                    }

                    if (remaining <= 0) {
                        window.clearInterval(intervalId);
                        adminForceLogout();
                    }
                }, 1000);
            }
            //]]>
        </h:outputScript>

        <!-- Preloader - style you can find in spinners.css -->
        <div class="preloader" id="progressBarId" style="display: none;background:none;">
            <div class="loader">
                <div class="loader__label" style="color: #{guestPreferences.activeLayoutColor} !important;">#{appInfo.appName} Loading...</div>

            </div>
        </div>
        <div class="layout-wrapper #{guestPreferences.getMenu()}">
            <p:growl id="mainMessagesGrowlId" showDetail="true"/>
            <ui:include src="./topbar.xhtml" />
            <ui:include src="./menu.xhtml" />

            <p:outputPanel id="contentPanelId" class="layout-main">
                <ui:insert name="content"/>
            </p:outputPanel>

            <p:outputPanel id="configPanelId">
            <ui:include src="./config.xhtml"/>
            </p:outputPanel>
            <ui:include src="./footer.xhtml" />

        </div>
        <p:ajaxStatus id="progressWaitStatus" 
                      onstart="showProgressBar();"
                      onsuccess="hideProgressBar();"/>

        <h:outputStylesheet name="css/font-awesome.css" library="avalon-layout" />
        <h:outputStylesheet name="css/primeflex.min.css" library="avalon-layout" />
        <h:outputStylesheet name="css/primeicons.css" library="avalon-layout" />
        <h:outputStylesheet name="css/layout-#{guestPreferences.layout}.css" library="avalon-layout" />
        <h:outputStylesheet name="css/demo.css" library="demo" />
    </h:body>

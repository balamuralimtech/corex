<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <f:facet name="first">
        <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
        <meta name="apple-mobile-web-app-capable" content="yes"/>
    </f:facet>
    <title>#{appInfo.appName}</title>
    <link rel="shortcut icon" href="#{request.contextPath}/resources/demo/images/coretix/coretixfavicon.png"
          type="image/x-icon"/>

    <h:outputStylesheet name="css/bootstrap.min.css" library="avalon-layout"/>
    <h:outputStylesheet name="css/bootstrap-icons.css" library="avalon-layout"/>
    <h:outputStylesheet name="css/templatemo-festava-live.css" library="avalon-layout"/>
    <style>
        #logo {
            position: absolute;
            top: 32px;
            left: 50px;
            width: 210px;
            height: 30px;
            display: inline-flex;
            align-items: center;
            font-family: "Roboto", sans-serif;
            font-size: 30px;
            font-weight: 700;
            letter-spacing: 0.04em;
            line-height: 1;
            color: #ffffff;
            text-decoration: none;
        }
    </style>
</h:head>

<h:body>
    <f:event listener="#{loginBean.initializePageAttributes}" type="preRenderComponent"/>
    <h:form id="form">
        <nav class="navbar navbar-expand-lg">
            <div class="container">
                <h:outputLink value="#{request.contextPath}/login" id="logo" styleClass="navbar-brand">
                    <h:outputText value="#{appInfo.appName}" />
                </h:outputLink>
                <!-- Sign In button -->
                <a class="btn custom-btn smoothscroll" href="#{request.contextPath}/login">
                    Let's Cure!
                </a>
            </div>
        </nav>


        <section class="hero-section" id="section_1">
            <div class="section-overlay"></div>

            <div class="container d-flex justify-content-center align-items-center">
                <div class="row">

                    <div class="col-12 mt-auto mb-5 text-center">


                        <h1 class="text-white mb-5">#{appInfo.loginHeadline}</h1>

                        <small>
                            #{appInfo.loginDescription}
                        </small>
                    </div>

                    <div class="col-lg-12 col-12 mt-auto d-flex flex-column text-center">

                        <div class="social-share">
                            <ul class="social-icon d-flex align-items-center justify-content-center">
                                <li class="social-icon-item">
                                    <a class="social-icon-link">
                                        <span class="bi-facebook"></span>
                                    </a>
                                </li>
                                <li class="social-icon-item">
                                    <a class="social-icon-link">
                                        <span class="bi-twitter"></span>
                                    </a>
                                </li>
                                <li class="social-icon-item">
                                    <a class="social-icon-link">
                                        <span class="bi-instagram"></span>
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
            <div class="video-wrap">
                <video autoplay="" loop="" muted="" class="custom-video">
                    <source src="resources/avalon-layout/videos/home.mp4" type="video/mp4"/>
                    Your browser does not support the video tag.
                </video>
            </div>
        </section>
        <h:outputStylesheet name="css/font-awesome.css" library="avalon-layout"/>
        <h:outputStylesheet name="css/primeflex.min.css" library="avalon-layout"/>
        <h:outputStylesheet name="css/primeicons.css" library="avalon-layout"/>
        <h:outputStylesheet name="css/layout-#{guestPreferences.layout}.css" library="avalon-layout"/>
        <h:outputStylesheet name="css/demo.css" library="demo"/>
        <h:outputScript name="js/jquery.min.js" library="avalon-layout"/>
        <h:outputScript name="js/bootstrap.min.js" library="avalon-layout"/>
        <h:outputScript name="js/jquery.sticky.js" library="avalon-layout"/>
        <h:outputScript name="js/click-scroll.js" library="avalon-layout"/>
        <h:outputScript name="js/custom.js" library="avalon-layout"/>
    </h:form>
</h:body>
</html>

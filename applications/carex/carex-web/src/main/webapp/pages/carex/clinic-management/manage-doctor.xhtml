<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/template.xhtml">

    <ui:define name="content">
        <f:event listener="#{doctorBean.initializePageAttributes}" type="preRenderView"/>

        <h:form id="form">
            <div class="card">
                <p:growl id="messages" showDetail="true"/>

                <div class="flex flex-column md:flex-row md:justify-content-between md:align-items-start gap-3 mb-4">
                    <div>
            <h1 style="margin:0;">#{i18n.app('manageDoctorTitle')}</h1>
                        <p style="margin:.5rem 0 0 0;color:#64748b;">#{i18n.app('manageDoctorDescription')}</p>
                    </div>
                    <div class="surface-100 border-round px-3 py-2">
                <label for="organizationFilter"><strong>#{i18n.core('organizationLabel')}:</strong></label>
                        <h:panelGroup rendered="#{doctorBean.applicationAdmin}" layout="block">
                            <p:selectOneMenu id="organizationFilter" value="#{doctorBean.selectedOrganizationId}" style="display:block;min-width:18rem;margin-top:.35rem;">
                    <f:selectItem itemLabel="#{i18n.app('selectOrganizationLabel')}" itemValue="#{null}" noSelectionOption="true"/>
                                <f:selectItems value="#{doctorBean.organizationList}" var="organization"
                                               itemValue="#{organization.id}" itemLabel="#{organization.organizationName}"/>
                                <p:ajax listener="#{doctorBean.onOrganizationChange}" update="form:doctorMainPanel form:messages" process="@this"/>
                            </p:selectOneMenu>
                        </h:panelGroup>
                        <h:panelGroup rendered="#{not doctorBean.applicationAdmin}" layout="block"
                                      style="margin-top:.45rem;font-weight:700;">
                            <h:outputText value="#{doctorBean.currentOrganizationName}"/>
                        </h:panelGroup>
                    </div>
                </div>

                <p:outputPanel id="doctorMainPanel">
                    <p:toolbar styleClass="mb-4">
                        <p:toolbarGroup>
                <p:commandButton value="#{i18n.app('newDoctorLabel')}" icon="pi pi-plus" actionListener="#{doctorBean.addButtonAction}"
                                             update="form:doctorDialogPanel form:dialogMessages" process="@this"
                                             oncomplete="PF('manageDoctorDialog').show()" styleClass="ui-button-success"/>
                <p:commandButton value="#{i18n.app('fetchDoctorsLabel')}" icon="pi pi-search" actionListener="#{doctorBean.fetchDoctorList}"
                                             update="form:doctorMainPanel" process="@this" styleClass="ui-button-info" style="margin-left:.5rem;"/>
                        </p:toolbarGroup>
                        <p:toolbarGroup align="right">
                            <span style="font-weight:600;">#{i18n.core('recordsLabel')}: #{doctorBean.doctorList.size()}</span>
                        </p:toolbarGroup>
                    </p:toolbar>

                    <p:outputPanel rendered="#{not doctorBean.doctorResultsLoaded}">
                        <div style="padding:1rem 0;color:#64748b;">
                #{i18n.app('doctorRecordsEmptyStatePrefix')} <strong>#{i18n.app('fetchDoctorsLabel')}</strong> #{i18n.app('doctorRecordsEmptyStateSuffix')}
                        </div>
                    </p:outputPanel>
                    <p:dataTable id="doctorTable" widgetVar="doctorTableWidget" var="doctorRow" value="#{doctorBean.doctorList}"
                                 rendered="#{doctorBean.doctorResultsLoaded}"
                                 paginator="true" rows="10" reflow="true" rowKey="#{doctorRow.id}"
                                 emptyMessage="#{i18n.app('noDoctorsFoundMessage')}">
                        <f:facet name="header">
                            <div class="flex flex-column md:flex-row md:justify-content-between md:align-items-center gap-2">
                        <span style="font-weight:600;">#{i18n.app('doctorDirectoryLabel')}</span>
                                <span class="p-input-icon-left">
                                    <i class="pi pi-search"/>
                                    <p:inputText id="globalFilter" onkeyup="PF('doctorTableWidget').filter()" placeholder="#{i18n.app('searchDoctorsPlaceholder')}"/>
                                </span>
                            </div>
                        </f:facet>

                        <p:column headerText="#{i18n.app('codeLabel')}" sortBy="#{doctorRow.doctorCode}" filterBy="#{doctorRow.doctorCode}">
                            <h:outputText value="#{doctorRow.doctorCode}"/>
                        </p:column>
                        <p:column headerText="#{i18n.app('doctorNameLabel')}" sortBy="#{doctorRow.doctorName}" filterBy="#{doctorRow.doctorName}">
                            <h:outputText value="#{doctorRow.doctorName}"/>
                        </p:column>
                        <p:column headerText="#{i18n.app('specializationLabel')}" sortBy="#{doctorRow.specialization}" filterBy="#{doctorRow.specialization}">
                            <h:outputText value="#{doctorRow.specialization}"/>
                        </p:column>
                        <p:column headerText="#{i18n.app('qualificationLabel')}">
                            <h:outputText value="#{doctorRow.qualification}"/>
                        </p:column>
                        <p:column headerText="#{i18n.app('phoneLabel')}">
                            <h:outputText value="#{doctorRow.phoneNumber}"/>
                        </p:column>
                        <p:column headerText="#{i18n.app('linkedUserLabel')}">
                            <h:panelGroup rendered="#{doctorRow.userDetail != null}">
                                <h:outputText value="#{doctorRow.userDetail.userName}"/>
                                <h:outputText value=" (#{doctorRow.userDetail.emailId})"/>
                                <h:outputText value=" - #{doctorRow.userDetail.role.roleName}" rendered="#{doctorRow.userDetail.role != null and not empty doctorRow.userDetail.role.roleName}"/>
                            </h:panelGroup>
                                            <h:outputText value="#{i18n.app('notLinkedLabel')}" rendered="#{doctorRow.userDetail == null}"/>
                        </p:column>
                        <p:column headerText="#{i18n.app('feeLabel')}">
                            <h:outputText value="#{doctorRow.consultationFee}"/>
                        </p:column>
                        <p:column headerText="#{i18n.app('statusLabel')}">
                                            <p:tag value="#{doctorRow.active ? i18n.app('activeDoctorStatusLabel') : i18n.app('inactiveStatusLabel')}"
                                   severity="#{doctorRow.active ? 'success' : 'warning'}"/>
                        </p:column>
                        <p:column exportable="false" style="width:8rem;">
                            <p:commandButton icon="pi pi-pencil" process="@this" styleClass="rounded-button ui-button-success"
                                             update="form:doctorDialogPanel form:dialogMessages"
                                             actionListener="#{doctorBean.confirmEditButtonAction}" oncomplete="PF('manageDoctorDialog').show()">
                                <f:setPropertyActionListener value="#{doctorRow}" target="#{doctorBean.selectedDoctor}"/>
                            </p:commandButton>
                            <p:commandButton icon="pi pi-trash" process="@this" styleClass="rounded-button ui-button-warning"
                                             oncomplete="PF('deleteDoctorDialog').show()">
                                <f:setPropertyActionListener value="#{doctorRow}" target="#{doctorBean.selectedDoctor}"/>
                            </p:commandButton>
                        </p:column>
                    </p:dataTable>
                </p:outputPanel>
            </div>

            <p:dialog header="#{doctorBean.addOperation ? i18n.app('addDoctorLabel') : i18n.app('editDoctorLabel')}" widgetVar="manageDoctorDialog"
                      modal="true" responsive="true" width="700">
                <p:outputPanel id="doctorDialogPanel" class="ui-fluid">
                    <p:messages id="dialogMessages" showDetail="true" closable="true"/>
                    <div class="grid">
                        <div class="col-12">
                                    <label>#{i18n.core('organizationLabel')} *</label>
                            <h:panelGroup rendered="#{doctorBean.applicationAdmin}" layout="block">
                                <p:selectOneMenu value="#{doctorBean.formOrganizationId}" style="width:100%;">
                                            <f:selectItem itemLabel="#{i18n.app('selectOrganizationLabel')}" itemValue="#{null}" noSelectionOption="true"/>
                                    <f:selectItems value="#{doctorBean.organizationList}" var="organization"
                                                   itemValue="#{organization.id}" itemLabel="#{organization.organizationName}"/>
                                    <p:ajax listener="#{doctorBean.onFormOrganizationChange}" process="@this"
                                            update="form:doctorDialogPanel"/>
                                </p:selectOneMenu>
                            </h:panelGroup>
                            <h:panelGroup rendered="#{not doctorBean.applicationAdmin}" layout="block"
                                          style="font-weight:700;padding-top:.6rem;">
                                <h:outputText value="#{doctorBean.currentOrganizationName}"/>
                            </h:panelGroup>
                        </div>
                        <div class="col-12 md:col-4">
                                    <label>#{i18n.app('doctorCodeLabel')} *</label>
                            <p:inputText value="#{doctorBean.doctor.doctorCode}" maxlength="30"/>
                        </div>
                        <div class="col-12 md:col-8">
                                    <label>#{i18n.app('doctorNameLabel')} *</label>
                            <p:inputText value="#{doctorBean.doctor.doctorName}" maxlength="120"/>
                        </div>
                        <div class="col-12 md:col-6">
                                    <label>#{i18n.app('qualificationLabel')}</label>
                            <p:inputText value="#{doctorBean.doctor.qualification}" maxlength="120"/>
                        </div>
                        <div class="col-12 md:col-6">
                                    <label>#{i18n.app('specializationLabel')}</label>
                            <p:inputText value="#{doctorBean.doctor.specialization}" maxlength="120"/>
                        </div>
                        <div class="col-12 md:col-6">
                                    <label>#{i18n.app('licenseNumberLabel')}</label>
                            <p:inputText value="#{doctorBean.doctor.licenseNumber}" maxlength="80"/>
                        </div>
                        <div class="col-12 md:col-6">
                                    <label>#{i18n.app('genderLabel')}</label>
                            <p:selectOneMenu value="#{doctorBean.doctor.gender}" style="width:100%;">
                                            <f:selectItem itemLabel="#{i18n.app('selectGenderLabel')}" itemValue="#{null}" noSelectionOption="true"/>
                                <f:selectItems value="#{doctorBean.availableGenders}"/>
                            </p:selectOneMenu>
                        </div>
                        <div class="col-12 md:col-6">
                                    <label>#{i18n.app('linkedUserLabel')}</label>
                            <p:selectOneMenu value="#{doctorBean.selectedUserId}" style="width:100%;">
                                            <f:selectItem itemLabel="#{i18n.app('noLinkedUserLabel')}" itemValue="#{null}" noSelectionOption="true"/>
                                <f:selectItems value="#{doctorBean.availableUserSelectItems}"/>
                            </p:selectOneMenu>
                        </div>
                        <div class="col-12 md:col-6">
                                    <label>#{i18n.app('phoneNumberLabel')} *</label>
                            <p:inputText value="#{doctorBean.doctor.phoneNumber}" maxlength="30"/>
                        </div>
                        <div class="col-12 md:col-6">
                                    <label>#{i18n.app('emailAddressLabel')}</label>
                            <p:inputText value="#{doctorBean.doctor.emailAddress}" maxlength="120"/>
                        </div>
                        <div class="col-12 md:col-4">
                                    <label>#{i18n.app('consultationFeeLabel')}</label>
                            <p:inputNumber value="#{doctorBean.doctor.consultationFee}" decimalPlaces="2" minValue="0"/>
                        </div>
                        <div class="col-12 md:col-4">
                                    <label>#{i18n.app('experienceYearsLabel')}</label>
                            <p:spinner value="#{doctorBean.doctor.experienceYears}" min="0" max="60"/>
                        </div>
                        <div class="col-12 md:col-4">
                                    <label>#{i18n.app('durationMinutesLabel')}</label>
                            <p:spinner value="#{doctorBean.doctor.consultationDurationMinutes}" min="1" max="240"/>
                        </div>
                        <div class="col-12">
                            <div class="field-checkbox mb-0">
                                <p:selectBooleanCheckbox id="doctorActive" value="#{doctorBean.doctor.active}"/>
                                    <p:outputLabel for="doctorActive" value="#{i18n.app('activeDoctorToggleLabel')}"/>
                            </div>
                        </div>
                        <div class="col-12">
                                    <label>#{i18n.core('notesLabel')}</label>
                            <p:inputTextarea value="#{doctorBean.doctor.notes}" rows="4" autoResize="false" maxlength="500"/>
                        </div>
                    </div>
                </p:outputPanel>
                <f:facet name="footer">
                            <p:commandButton value="#{i18n.app('saveDoctorLabel')}" icon="pi pi-check" actionListener="#{doctorBean.saveDoctor}"
                                     process="doctorDialogPanel @this" update="doctorDialogPanel :form:doctorMainPanel :form:messages"/>
                            <p:commandButton value="#{i18n.core('cancelLabel')}" icon="pi pi-times" type="button"
                                     onclick="PF('manageDoctorDialog').hide()" styleClass="ui-button-secondary"/>
                </f:facet>
            </p:dialog>

            <p:confirmDialog widgetVar="deleteDoctorDialog" header="#{i18n.app('confirmDeleteLabel')}" severity="warn"
                             message="#{i18n.app('deleteSelectedDoctorMessage')}">
                    <p:commandButton value="#{i18n.core('yesLabel')}" icon="pi pi-check" actionListener="#{doctorBean.confirmDeleteDoctor}"
                                 process="@this" update=":form:doctorMainPanel :form:messages"
                                 oncomplete="PF('deleteDoctorDialog').hide()"/>
                    <p:commandButton value="#{i18n.core('noLabel')}" type="button" icon="pi pi-times"
                                 onclick="PF('deleteDoctorDialog').hide()" styleClass="ui-button-secondary"/>
            </p:confirmDialog>
        </h:form>
    </ui:define>
</ui:composition>
